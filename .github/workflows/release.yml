name: Release Build

on:
  push:
    tags:
      - 'v*' # 触发条件：推送 v 开头的 tag（如 v0.1.0）
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform.os, 'macos-')
        run: |
          rustup target add ${{ matrix.platform.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Validate signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set."
            echo "::error::Without it, tauri build will not produce .sig files and latest.json cannot be generated."
            echo "::error::Go to Settings → Secrets and variables → Actions and add TAURI_SIGNING_PRIVATE_KEY."
            echo "::error::See docs/BUILD.md for key generation instructions."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 签名密钥：用于对安装包签名并生成 latest.json（应用内自动更新所需）
          # 配置方式：Settings → Secrets and variables → Actions
          # - TAURI_SIGNING_PRIVATE_KEY: 私钥文件内容（base64）
          # - TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 私钥密码（无密码则留空）
          # 详见 docs/BUILD.md 中"应用内自动更新签名配置"章节
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cofree ${{ github.ref_name }}'
          releaseBody: |
            ## Cofree ${{ github.ref_name }}
            
            ### 下载说明
            - **macOS (Apple Silicon)**：下载 `*_aarch64.dmg`
            - **macOS (Intel)**：下载 `*_x64.dmg`
            - **Windows**：下载 `.msi` 或 `-setup.exe`
            
            已安装用户可在应用内自动收到更新提示。
            
            ### 安装说明
            详见 [BUILD.md](https://github.com/J-York/Cofree/blob/main/docs/BUILD.md)
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }}
