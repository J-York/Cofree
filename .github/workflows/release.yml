name: Release Build

on:
  push:
    tags:
      - 'v*' # 触发条件：推送 v 开头的 tag（如 v0.1.0）
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - name: Ensure single published release exists
        id: ensure_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            if (!tag || !tag.startsWith("v")) {
              core.setFailed(`This workflow requires a tag ref, got: ${context.ref}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `Cofree ${tag}`;
            const releaseBody = [
              '## Cofree ' + tag,
              '',
              '**本地优先的 AI 编程助手**——你提需求、看审批、做验收，AI 负责读代码、生成 patch、执行命令。',
              '',
              '### 本版说明',
              '',
              '- **对话与编排**：流式回复、多角色 Agent（全栈 / 代码审查 / 架构 / QA）、子任务委派与长对话压缩。',
              '- **代码理解**：工作区文件读取、grep/glob、Git 状态与 diff、动态工作区刷新，支持 `.cofreerc` 配置。',
              '- **审批驱动**：代码修改（`propose_file_edit` / `propose_apply_patch`）与命令执行（`propose_shell`）均需用户确认，Rust 端拦截危险命令。',
              '- **可观察与恢复**：本地审计日志、SQLite checkpoint、patch 失败自动回滚至 `~/.cofree/snapshots/`。',
              '- **模型与密钥**：多供应商/多模型、API Key 加密存于 `~/.cofree/`，支持代理与「允许云模型」开关。',
              '',
              '### 下载',
              '',
              '| 平台 | 文件 |',
              '|------|------|',
              '| macOS (Apple Silicon) | `*_aarch64.dmg` |',
              '| macOS (Intel) | `*_x64.dmg` |',
              '| Windows | `.msi` 或 `-setup.exe` |',
              '',
              '已安装用户可在应用内收到自动更新提示。',
              '',
              '### 安装与构建',
              '',
              '详见 [BUILD.md](https://github.com/J-York/Cofree/blob/main/docs/BUILD.md)。',
            ].join('\n');

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tag,
              });
              release = response.data;
              core.info(`Found existing release ${release.id}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = created.data;
              core.info(`Created release ${release.id}`);
            }

            if (
              release.draft ||
              release.prerelease ||
              release.name !== releaseName ||
              (release.body ?? "") !== releaseBody
            ) {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = updated.data;
              core.info(`Updated release ${release.id}`);
            }

            core.setOutput("release_id", String(release.id));

  release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.platform.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform.os, 'macos-')
        run: |
          rustup target add ${{ matrix.platform.target }}

      - name: Resolve signing modes
        id: signing_modes
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          has_tauri_signing=false
          has_macos_signing=false
          has_apple_api_notarization=false
          has_apple_id_notarization=false
          has_windows_signing=false

          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            has_tauri_signing=true
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY is not configured; this release will skip updater artifacts and automatic updates will remain on the previous signed release."
          fi

          if [[ "${{ matrix.platform.os }}" == macos-* ]]; then
            if [ -n "$APPLE_CERTIFICATE" ] && [ "$APPLE_CERTIFICATE" != "none" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
              has_macos_signing=true
            else
              has_macos_signing=false
              echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
              echo "::warning::macOS signing certificate secrets are not configured; using ad-hoc signing identity '-' for macOS artifacts."
            fi

            if [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_PRIVATE_KEY" ]; then
              has_apple_api_notarization=true
            elif [ -n "$APPLE_API_ISSUER$APPLE_API_KEY$APPLE_API_PRIVATE_KEY" ]; then
              echo "::warning::Incomplete App Store Connect notarization secrets detected; API-based notarization will be skipped."
            fi

            if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
              has_apple_id_notarization=true
            elif [ -n "$APPLE_ID$APPLE_PASSWORD$APPLE_TEAM_ID" ]; then
              echo "::warning::Incomplete Apple ID notarization secrets detected; Apple ID notarization will be skipped."
            fi

            if [ "$has_macos_signing" = true ] && [ "$has_apple_api_notarization" != true ] && [ "$has_apple_id_notarization" != true ]; then
              echo "::warning::macOS signing is enabled, but notarization credentials are missing; the artifacts will be signed but not notarized."
            fi
          fi

          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            if [ -n "$WINDOWS_CERTIFICATE" ] && [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ] && [ -n "$WINDOWS_CERTIFICATE_THUMBPRINT" ]; then
              has_windows_signing=true
            else
              echo "::warning::Windows signing secrets are not fully configured; Windows artifacts will be built without Authenticode signing."
            fi
          fi

          if [[ "${{ matrix.platform.os }}" == macos-* ]] && [ "$has_macos_signing" = true ]; then
            if [ "$has_apple_api_notarization" = true ]; then
              echo "TAURI_APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
              echo "TAURI_APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
            fi
            if [ "$has_apple_id_notarization" = true ]; then
              echo "TAURI_APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
              echo "TAURI_APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
              echo "TAURI_APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            fi
          fi

          echo "has_tauri_signing=$has_tauri_signing" >> "$GITHUB_OUTPUT"
          echo "has_macos_signing=$has_macos_signing" >> "$GITHUB_OUTPUT"
          echo "has_apple_api_notarization=$has_apple_api_notarization" >> "$GITHUB_OUTPUT"
          echo "has_apple_id_notarization=$has_apple_id_notarization" >> "$GITHUB_OUTPUT"
          echo "has_windows_signing=$has_windows_signing" >> "$GITHUB_OUTPUT"

          echo "HAS_TAURI_SIGNING_KEY=$has_tauri_signing" >> "$GITHUB_ENV"
          echo "HAS_MACOS_SIGNING=$has_macos_signing" >> "$GITHUB_ENV"
          echo "HAS_APPLE_API_NOTARIZATION=$has_apple_api_notarization" >> "$GITHUB_ENV"
          echo "HAS_APPLE_ID_NOTARIZATION=$has_apple_id_notarization" >> "$GITHUB_ENV"
          echo "HAS_WINDOWS_SIGNING=$has_windows_signing" >> "$GITHUB_ENV"

      - name: Import Apple Developer Certificate
        if: startsWith(matrix.platform.os, 'macos-') && steps.signing_modes.outputs.has_macos_signing == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          if [ ! -s certificate.p12 ]; then
            echo "::error::Decoded certificate file is empty. Check APPLE_CERTIFICATE secret."
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Use -A to allow all applications to access the items, or keep targeted -T
          if ! security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "::error::Failed to import certificate.p12. Verify APPLE_CERTIFICATE_PASSWORD and certificate validity."
            exit 1
          fi
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application|Apple Distribution|Apple Development/ {print $2; exit}')
          if [ -z "$CERT_ID" ]; then
            echo "::warning::Unable to locate a usable Apple code signing identity in the imported keychain; proceeding without macOS signing."
          else
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "Successfully found identity: $CERT_ID"
          fi

      - name: Prepare macOS notarization credentials
        if: startsWith(matrix.platform.os, 'macos-') && steps.signing_modes.outputs.has_macos_signing == 'true' && steps.signing_modes.outputs.has_apple_api_notarization == 'true'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Import Windows certificate
        if: matrix.platform.os == 'windows-latest' && steps.signing_modes.outputs.has_windows_signing == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt -Force
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText) | Out-Null

      - name: Write release config
        shell: bash
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const config = {};
          if (process.env.HAS_TAURI_SIGNING_KEY !== 'true') {
            config.bundle = {
              ...(config.bundle ?? {}),
              createUpdaterArtifacts: false,
            };
          }

          if (process.env.HAS_WINDOWS_SIGNING === 'true') {
            config.bundle = {
              ...(config.bundle ?? {}),
              windows: {
                certificateThumbprint: process.env.WINDOWS_CERTIFICATE_THUMBPRINT,
                digestAlgorithm: process.env.WINDOWS_DIGEST_ALGORITHM || 'sha256',
                timestampUrl: process.env.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com',
              },
            };
          }

          fs.writeFileSync('src-tauri/tauri.release.conf.json', JSON.stringify(config, null, 2));
          EOF

      - name: Prepare Tauri build arguments
        shell: bash
        run: |
          args="--target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }} --config src-tauri/tauri.release.conf.json"
          echo "TAURI_BUILD_ARGS=$args" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app with updater artifacts
        if: steps.signing_modes.outputs.has_tauri_signing == 'true'
        uses: tauri-apps/tauri-action@44a5bf1eaeeebdabfd8951645f567c83b0ae02a3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.TAURI_APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.TAURI_APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ID: ${{ env.TAURI_APPLE_ID }}
          APPLE_PASSWORD: ${{ env.TAURI_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.TAURI_APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ env.TAURI_BUILD_ARGS }}

      - name: Build Tauri app without updater artifacts
        if: steps.signing_modes.outputs.has_tauri_signing != 'true'
        uses: tauri-apps/tauri-action@44a5bf1eaeeebdabfd8951645f567c83b0ae02a3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.TAURI_APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.TAURI_APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ID: ${{ env.TAURI_APPLE_ID }}
          APPLE_PASSWORD: ${{ env.TAURI_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.TAURI_APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: ${{ env.TAURI_BUILD_ARGS }}
