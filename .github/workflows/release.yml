name: Release Build

on:
  push:
    tags:
      - 'v*' # 触发条件：推送 v 开头的 tag（如 v0.1.0）
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - name: Ensure single published release exists
        id: ensure_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            if (!tag || !tag.startsWith("v")) {
              core.setFailed(`This workflow requires a tag ref, got: ${context.ref}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `Cofree ${tag}`;
            const releaseBody = [
              `## Cofree ${tag}`,
              '',
              '### 下载说明',
              '- **macOS (Apple Silicon)**：下载 `*_aarch64.dmg`',
              '- **macOS (Intel)**：下载 `*_x64.dmg`',
              '- **Windows**：下载 `.msi` 或 `-setup.exe`',
              '',
              '已安装用户可在应用内自动收到更新提示。',
              '',
              '### 安装说明',
              '详见 [BUILD.md](https://github.com/J-York/Cofree/blob/main/docs/BUILD.md)',
            ].join('\n');

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tag,
              });
              release = response.data;
              core.info(`Found existing release ${release.id}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = created.data;
              core.info(`Created release ${release.id}`);
            }

            if (
              release.draft ||
              release.prerelease ||
              release.name !== releaseName ||
              (release.body ?? "") !== releaseBody
            ) {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = updated.data;
              core.info(`Updated release ${release.id}`);
            }

            core.setOutput("release_id", String(release.id));

  release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform.os, 'macos-')
        run: |
          rustup target add ${{ matrix.platform.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@44a5bf1eaeeebdabfd8951645f567c83b0ae02a3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }}
