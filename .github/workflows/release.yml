name: Release Build

on:
  push:
    tags:
      - 'v*' # 触发条件：推送 v 开头的 tag（如 v0.1.0）
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - name: Ensure single published release exists
        id: ensure_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            if (!tag || !tag.startsWith("v")) {
              core.setFailed(`This workflow requires a tag ref, got: ${context.ref}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `Cofree ${tag}`;
            const releaseBody = [
              '## Cofree ' + tag,
              '',
              '**本地优先的 AI 编程助手**——你提需求、看审批、做验收，AI 负责读代码、生成 patch、执行命令。',
              '',
              '### 本版说明',
              '',
              '- **对话与编排**：流式回复、多角色 Agent（全栈 / 代码审查 / 架构 / QA）、子任务委派与长对话压缩。',
              '- **代码理解**：工作区文件读取、grep/glob、Git 状态与 diff、动态工作区刷新，支持 `.cofreerc` 配置。',
              '- **审批驱动**：代码修改（`propose_file_edit` / `propose_apply_patch`）与命令执行（`propose_shell`）均需用户确认，Rust 端拦截危险命令。',
              '- **可观察与恢复**：本地审计日志、SQLite checkpoint、patch 失败自动回滚至 `~/.cofree/snapshots/`。',
              '- **模型与密钥**：多供应商/多模型、API Key 加密存于 `~/.cofree/`，支持代理与「允许云模型」开关。',
              '',
              '### 下载',
              '',
              '| 平台 | 文件 |
              '|------|------|
              '| macOS (Apple Silicon) | `*_aarch64.dmg` |
              '| macOS (Intel) | `*_x64.dmg` |
              '| Windows | `.msi` 或 `-setup.exe` |
              '',
              '已安装用户可在应用内收到自动更新提示。',
              '',
              '### 安装与构建',
              '',
              '详见 [BUILD.md](https://github.com/J-York/Cofree/blob/main/docs/BUILD.md)。',
            ].join('\n');

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tag,
              });
              release = response.data;
              core.info(`Found existing release ${release.id}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = created.data;
              core.info(`Created release ${release.id}`);
            }

            if (
              release.draft ||
              release.prerelease ||
              release.name !== releaseName ||
              (release.body ?? "") !== releaseBody
            ) {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              release = updated.data;
              core.info(`Updated release ${release.id}`);
            }

            core.setOutput("release_id", String(release.id));

  release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform.os, 'macos-')
        run: |
          rustup target add ${{ matrix.platform.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@44a5bf1eaeeebdabfd8951645f567c83b0ae02a3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }}
